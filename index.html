<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starfall Salvage — Tactical Extraction Runner</title>
    <meta name="description" content="Recover the cores. Survive the storm. Extract alive. A 3D tactical extraction runner built with Three.js." />

    <!-- Open Graph -->
    <meta property="og:title" content="Starfall Salvage" />
    <meta property="og:description" content="Recover the cores. Survive the storm. Extract alive. A 3D tactical extraction runner." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Starfall Salvage" />
    <meta name="twitter:description" content="Recover the cores. Survive the storm. Extract alive." />

    <!-- Favicon (inline SVG) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0a0605" />

    <!-- Loading screen styles (shown before JS loads) -->
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0605;
        font-family: system-ui, sans-serif;
        transition: opacity 0.5s ease;
      }
      #loading-screen .title {
        font-size: clamp(1.6rem, 4vw, 3rem);
        font-weight: 800;
        letter-spacing: 0.1em;
        color: #e8e0d8;
        text-shadow: 0 0 16px rgba(74,216,160,0.4);
        margin: 0;
      }
      #loading-screen .bar-wrap {
        margin-top: 1.5rem;
        width: 200px;
        height: 4px;
        border-radius: 2px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
      }
      #loading-screen .bar-fill {
        width: 30%;
        height: 100%;
        border-radius: 2px;
        background: #4ad8a0;
        animation: loading-pulse 1.2s ease-in-out infinite;
      }
      @keyframes loading-pulse {
        0% { width: 10%; margin-left: 0; }
        50% { width: 50%; margin-left: 25%; }
        100% { width: 10%; margin-left: 90%; }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen (removed by JS after init) -->
    <div id="loading-screen">
      <p class="title">STARFALL SALVAGE</p>
      <div class="bar-wrap"><div class="bar-fill"></div></div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
